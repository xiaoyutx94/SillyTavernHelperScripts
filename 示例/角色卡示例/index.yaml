# yaml-language-server: $schema=https://testingcf.jsdelivr.net/gh/StageDog/tavern_sync/dist/schema/character.zh.json
头像: 头像
版本: 1.0.0
作者: 青空莉想做舞台少女的狗
备注: '青空莉导航站: https://stagedog.github.io/'

第一条消息:
  - 文件: 第一条消息/0
  - 文件: 第一条消息/1

角色描述: ''

锚点:
  - &分隔符
    启用: false
    激活策略:
      类型: 向量化
    插入位置:
      类型: 角色定义之前
      顺序: 14720
    激活概率: 100
    内容: ''
  - &立即事件
    启用: true
    插入位置:
      类型: 指定深度
      角色: 系统
      深度: 0
      顺序: 14720
    激活概率: 100
    特殊效果:
      黏性: 5
      冷却: 9999
    递归:
      不可被其他条目激活: true
      不可激活其他条目: true

世界书名称: 与角色卡名称相同
条目:
  - 名称: C+C第一人称文风
    启用: true
    激活策略:
      类型: 蓝灯
    插入位置:
      类型: 指定深度
      角色: 系统
      深度: 0
      顺序: 14720
    激活概率: 100
    递归:
      不可被其他条目激活: true
      不可激活其他条目: true
    文件: 世界书/文风

  - 名称: 交错频道
    启用: true
    激活策略:
      类型: 蓝灯
    插入位置:
      类型: 指定深度
      角色: 系统
      深度: 0
      顺序: 14720
    激活概率: 100
    递归:
      不可被其他条目激活: true
      不可激活其他条目: true
    文件: 世界书/交错频道

  - 文件夹: 变量
    条目:
      - 名称: ===变量开始===
        <<: *分隔符

      - 名称: '[initvar]变量初始化勿开'
        启用: false
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 角色定义之前
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/initvar

      - 名称: 变量列表
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/变量列表

      - 名称: '[mvu_update]变量更新规则'
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/变量更新规则

      - 名称: '[mvu_update]变量输出格式'
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/变量输出格式

      - 名称: ===变量结束===
        <<: *分隔符

  - 文件夹: 角色
    条目:
      - 名称: ===角色开始===
        <<: *分隔符

      - 名称: 角色详情
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 角色定义之后
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/角色/角色详情

      - 名称: 角色阶段
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        文件: 世界书/角色/角色阶段

      - 名称: ===角色结束===
        <<: *分隔符

  - 文件夹: 立即事件
    条目:
      - 名称: ===立即事件开始===
        <<: *分隔符

      - 名称: 冲动啊，请平息吧
        <<: *立即事件
        激活策略:
          类型: 绿灯
          关键字:
            - 【【冲动啊，请平息吧】】
        文件: 世界书/立即事件/冲动啊，请平息吧

      - 名称: 理性啊，请不要冻结
        <<: *立即事件
        激活策略:
          类型: 绿灯
          关键字:
            - 【【理性啊，请不要冻结】】
        文件: 世界书/立即事件/理性啊，请不要冻结

      - 名称: ===立即事件结束===
        <<: *分隔符

